services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: automaker-server
    environment:
      HOST: 0.0.0.0
      PORT: 3008
      DATA_DIR: /data
    volumes:
      - ./data:/data
      - ./:/workspace:ro
    ports:
      - "3008:3008"

  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    container_name: automaker-ui
    environment:
      AUTOMAKER_WEB_PORT: 3007
      AUTOMAKER_SERVER_PORT: 3008
      # Internal server URL over docker network (two-container deployment)
      AUTOMAKER_SERVER_URL: http://server:3008
    depends_on:
      - server
    ports:
      - "3007:3007"
